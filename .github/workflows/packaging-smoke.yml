name: Packaging Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libxcb1-dev libxfixes-dev libwayland-dev
      - name: Install from a clean package root
        run: cargo install --path . --root "${{ runner.temp }}/vbuff-install" --locked
      - name: Verify installed binary and doctor contract
        shell: bash
        run: |
          binary="${{ runner.temp }}/vbuff-install/bin/vbuff"
          if [[ "${{ runner.os }}" == "Windows" ]]; then binary="${binary}.exe"; fi
          digest="$(python -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$binary")"
          "$binary" verify --file "$binary" --sha256 "$digest"
          "$binary" doctor --json > doctor.json
          python -c 'import json; data=json.load(open("doctor.json")); assert "capture_allowed" in data and "security_posture" in data'
