name: WASM Demo

on:
  pull_request:
    paths:
      - "crates/vbuff-gui/**"
      - "web-demo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/wasm-demo.yml"
  push:
    branches: [main]
    paths:
      - "crates/vbuff-gui/**"
      - "web-demo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/wasm-demo.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WASM target for the pinned toolchain
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Compile fake-data popup demo
        run: cargo check -p vbuff-gui --bin wasm_popup --target wasm32-unknown-unknown --locked
